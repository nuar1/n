<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Sliding Door Experts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0056a7 0%, #003d7a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .error-container {
            text-align: center;
        }
        .error-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ff7a00;
        }
        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }
        .error-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .btn-home {
            background: #ff7a00;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background: #e66600;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="error-container">
                    <div class="error-number">404</div>
                    <h1 class="error-title">Oops! Door Not Found</h1>
                    <p class="error-message">
                        The page you're looking for seems to have slid away! 
                        But don't worry, our sliding door experts are still here to help.
                    </p>
                    <div class="mb-4">
                        <a href="/" class="btn-home">
                            <i class="fas fa-home"></i>
                            Back to Home
                        </a>
                    </div>
                    <div class="contact-info">
                        <p><strong>Need Emergency Repair?</strong></p>
                        <a href="tel:+1-239-555-0123" class="btn btn-outline-light">
                            <i class="fas fa-phone me-2"></i>
                            Call (239) 555-0123
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
